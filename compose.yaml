version: '3.8'

services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 9000 --reload
    ports:
      - "9000:9000"
    volumes:
      - .:/code  # Mapeia sua pasta local para o contêiner (Hot-reload ativado)
      - ./nfs_storage:/mnt/nfs/uploads
    env_file:
      - .env
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - .:/code
      - ./nfs_storage:/mnt/nfs/uploads
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data: